version: '3.8'

services:
  couchdb:
    image: couchdb:3.3.1
    container_name: couchdb
    restart: unless-stopped
    environment:
      - COUCHDB_USER=${COUCHDB_USER:-admin}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD:-example}
    volumes:
      - couchdb-data:/opt/couchdb/data
    ports:
      - "5984:5984"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - dev

volumes:
  couchdb-data:
    driver: local

networks:
  dev:
    driver: bridge
