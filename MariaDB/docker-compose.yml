services:
  mariadb:
    image: mariadb:11
    # restart: always
    environment:
      MYSQL_DATABASE: docker_maria
      MYSQL_ROOT_PASSWORD: pass
    volumes:
      - mariadb-data:/var/lib/mysql
    ports:
      - 3307:3306

volumes:
  mariadb-data:

networks:
  dev:
    driver: bridge
# connection string mysql://root:pass@localhost:3307/databasename
# data grip connection string jdbc:mariadb://localhost:3307/databasename
